name: Manual Deploy (Emergency)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - production
          - staging
      component:
        description: 'Component to deploy'
        required: true
        type: choice
        options:
          - backend-only
          - frontend-only
          - both
      skip_tests:
        description: 'Skip tests (emergency only)'
        required: false
        type: boolean
        default: false
      skip_backup:
        description: 'Skip backup (not recommended)'
        required: false
        type: boolean
        default: false

jobs:
  confirm-deployment:
    name: Confirm Emergency Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Display deployment details
        run: |
          echo "## 🚨 Emergency Deployment Requested" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Component:** ${{ github.event.inputs.component }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skip Tests:** ${{ github.event.inputs.skip_tests }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skip Backup:** ${{ github.event.inputs.skip_backup }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event.inputs.skip_tests }}" == "true" ]; then
            echo "⚠️ **WARNING:** Tests will be skipped!" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ github.event.inputs.skip_backup }}" == "true" ]; then
            echo "⚠️ **WARNING:** Backup will be skipped!" >> $GITHUB_STEP_SUMMARY
          fi

  deploy-backend:
    name: Emergency Backend Deploy
    needs: confirm-deployment
    if: ${{ github.event.inputs.component == 'backend-only' || github.event.inputs.component == 'both' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test backend (if not skipped)
        if: ${{ github.event.inputs.skip_tests == 'false' }}
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ github.event.inputs.environment == 'production' && secrets.PRODUCTION_SERVER_HOST || secrets.STAGING_SERVER_HOST }}
          username: ${{ github.event.inputs.environment == 'production' && secrets.PRODUCTION_SERVER_USER || secrets.STAGING_SERVER_USER }}
          key: ${{ github.event.inputs.environment == 'production' && secrets.PRODUCTION_SSH_PRIVATE_KEY || secrets.STAGING_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            
            APP_DIR="/opt/lush_laundry"
            if [ "${{ github.event.inputs.environment }}" == "staging" ]; then
              APP_DIR="/opt/lush_laundry_staging"
            fi
            
            cd $APP_DIR
            
            # Backup (unless skipped)
            if [ "${{ github.event.inputs.skip_backup }}" == "false" ]; then
              echo "📦 Creating backup..."
              BACKUP_DIR="/opt/lush_laundry_backups/emergency_$(date +%Y%m%d_%H%M%S)"
              mkdir -p "$BACKUP_DIR"
              cp -r backend/dist "$BACKUP_DIR/" 2>/dev/null || echo "No dist to backup"
            fi
            
            # Pull and deploy
            echo "📥 Pulling latest code..."
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            
            cd backend
            echo "🔧 Building backend..."
            npm ci --production
            npm run build
            
            echo "♻️ Restarting service..."
            PM2_NAME="lush-laundry-backend"
            if [ "${{ github.event.inputs.environment }}" == "staging" ]; then
              PM2_NAME="lush-laundry-staging"
            fi
            
            pm2 reload $PM2_NAME --update-env || pm2 start dist/index.js --name $PM2_NAME
            
            echo "✅ Emergency deployment complete!"
            pm2 list | grep $PM2_NAME

  deploy-frontend:
    name: Emergency Frontend Deploy
    needs: confirm-deployment
    if: ${{ github.event.inputs.component == 'frontend-only' || github.event.inputs.component == 'both' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: './frontend/dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "🚨 Emergency deploy by ${{ github.actor }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  post-deployment:
    name: Post-Deployment Report
    needs: [deploy-backend, deploy-frontend]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate deployment report
        run: |
          echo "## 🚨 Emergency Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status Summary:**" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ needs.deploy-backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.deploy-frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- Component: ${{ github.event.inputs.component }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deployed by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.deploy-backend.result }}" == "success" ] || [ "${{ needs.deploy-frontend.result }}" == "success" ]; then
            echo "✅ Emergency deployment completed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Emergency deployment failed - check logs above" >> $GITHUB_STEP_SUMMARY
          fi
