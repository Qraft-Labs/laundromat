name: Deploy to Production

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:  # Allow manual trigger
    inputs:
      skip_tests:
        description: 'Skip tests (emergency hotfix only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  test:
    name: Run Tests
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    uses: ./.github/workflows/test.yml

  deploy-backend:
    name: Deploy Backend to Production
    needs: [test]
    if: |
      always() && 
      (needs.test.result == 'success' || 
       needs.test.result == 'skipped' || 
       github.event.inputs.skip_tests == 'true')
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.PRODUCTION_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_SERVER_HOST }}
          username: ${{ secrets.PRODUCTION_SERVER_USER }}
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e  # Exit on any error
            
            echo "🚀 Starting production deployment..."
            
            cd /opt/lush_laundry
            
            # Backup current version
            BACKUP_DIR="/opt/lush_laundry_backups/$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            cp -r backend/dist "$BACKUP_DIR/" || echo "No dist to backup"
            
            # Pull latest code
            echo "📥 Pulling latest code from GitHub..."
            git fetch origin
            git reset --hard origin/main
            
            # Backend deployment
            echo "🔧 Building backend..."
            cd backend
            npm ci --production
            npm run build
            
            # Run database migrations
            echo "🗄️ Running database migrations..."
            npm run migrate --if-present || echo "No migrations to run"
            
            # Restart PM2 with zero downtime
            echo "♻️ Restarting backend service..."
            pm2 reload lush-laundry-backend --update-env || pm2 start dist/index.js --name lush-laundry-backend -i 2
            
            # Wait for service to be healthy
            echo "⏳ Waiting for service to be ready..."
            sleep 10
            
            # Health check
            echo "🏥 Running health check..."
            curl -f http://localhost:5000/health || curl -f http://localhost:5000/api/health || echo "Warning: Health check endpoint not responding"
            
            # Verify PM2 status
            pm2 list | grep lush-laundry-backend
            
            echo "✅ Production deployment completed successfully!"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_SERVER_HOST }}
          username: ${{ secrets.PRODUCTION_SERVER_USER }}
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "❌ Deployment failed! Attempting rollback..."
            cd /opt/lush_laundry
            
            # Find latest backup
            LATEST_BACKUP=$(ls -t /opt/lush_laundry_backups/ | head -1)
            
            if [ -n "$LATEST_BACKUP" ]; then
              echo "Rolling back to: $LATEST_BACKUP"
              cp -r "/opt/lush_laundry_backups/$LATEST_BACKUP/dist" backend/
              pm2 restart lush-laundry-backend
              echo "✅ Rollback completed"
            else
              echo "⚠️ No backup found for rollback"
            fi

      - name: Send deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Production deployment successful!"
            echo "Commit: ${{ github.sha }}"
            echo "Deployed by: ${{ github.actor }}"
          else
            echo "❌ Production deployment failed!"
            echo "Check logs and rollback if necessary"
            exit 1
          fi

  deploy-frontend:
    name: Deploy Frontend to Netlify
    needs: [test]
    if: |
      always() && 
      (needs.test.result == 'success' || 
       needs.test.result == 'skipped' || 
       github.event.inputs.skip_tests == 'true')
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: './frontend/dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions - ${{ github.event.head_commit.message }}"
          enable-pull-request-comment: false
          enable-commit-comment: true
          overwrites-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Frontend deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Frontend deployment successful!"
          else
            echo "❌ Frontend deployment failed!"
            exit 1
          fi

  post-deployment:
    name: Post-Deployment Checks
    needs: [deploy-backend, deploy-frontend]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: System health check
        run: |
          echo "Backend Status: ${{ needs.deploy-backend.result }}"
          echo "Frontend Status: ${{ needs.deploy-frontend.result }}"
          
          if [ "${{ needs.deploy-backend.result }}" == "success" ] && [ "${{ needs.deploy-frontend.result }}" == "success" ]; then
            echo "✅ Full deployment successful!"
          else
            echo "⚠️ Partial deployment - check individual jobs"
            exit 1
          fi

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend:** ${{ needs.deploy-backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** ${{ needs.deploy-frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 Production deployment completed!" >> $GITHUB_STEP_SUMMARY
