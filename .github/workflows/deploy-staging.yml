name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml  # Calls test workflow

  deploy-staging:
    name: Deploy to Staging Server
    needs: test
    runs-on: ubuntu-latest
    environment: staging  # Create this environment in GitHub repo settings
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --production

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Deploy to Staging Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /opt/lush_laundry_staging
            
            # Pull latest code
            git fetch origin
            git reset --hard origin/develop
            
            # Install dependencies
            cd backend
            npm ci --production
            
            # Build backend
            npm run build
            
            # Run database migrations (if any)
            npm run migrate --if-present
            
            # Restart PM2 process
            pm2 restart lush-laundry-staging || pm2 start dist/index.js --name lush-laundry-staging
            
            # Health check
            sleep 5
            pm2 list | grep lush-laundry-staging

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Staging deployment successful!"
          else
            echo "❌ Staging deployment failed!"
            exit 1
          fi
